# Enforce the Suraya 2-approval rule for PRs labeled `agent-generated`.
#
# Background:
# - The org-wide rule (suraya/governance/branch-protection.md) requires
#   2 human approvals before merge for any PR authored or co-authored by
#   an AI agent. The default GitHub branch protection setting only allows
#   a single global approval-count threshold, which doesn't differentiate
#   by label. This workflow fills that gap.
# - The companion `agent-label` job in ci.yml applies the `agent-generated`
#   label to qualifying PRs. This workflow then enforces the count.
# - Tier N grantees (see surayainc/suraya:governance/tier-n-grants.md) are
#   exempt from the 2-approval requirement on PRs they author themselves.
#   The exemption is the workflow-level counterpart to the GitHub-level
#   `bypass_pull_request_allowances` carveout described in
#   suraya/governance/branch-protection.md > "Tier N bypass".
#
# How to wire this in:
# 1. This workflow runs on every PR event and review event.
# 2. It produces a status check named "agent-pr-approval".
# 3. Add "agent-pr-approval" to the list of required status checks in your
#    branch protection settings (alongside lint, typecheck, test, build).
#    See suraya/governance/branch-protection.md for the canonical list.
# 4. Once required, a labeled PR cannot merge until either (a) 2 distinct
#    human approvals are recorded, or (b) the PR author is on the Tier N
#    active grants roster. Unlabeled PRs are unaffected (the check passes
#    trivially).
#
# Tier N roster fetch:
# - The roster is read from `governance/tier-n-grants.md` in the
#   `surayainc/suraya` repo at run time. That doc is the single source of
#   truth — there is no per-repo copy of the roster to drift.
# - If suraya is private and the running GITHUB_TOKEN cannot read it, the
#   fetch fails and the workflow falls through to the 2-approval check.
#   Fail-closed: never grant a bypass we cannot verify. Repos that expect
#   the bypass to apply must either run in a context where the token can
#   read suraya, or arrange suraya visibility accordingly.

name: agent-pr-approval

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  pull-requests: read
  contents: read

jobs:
  enforce:
    name: agent-pr-approval
    runs-on: ubuntu-latest
    env:
      TIER_N_GRANTS_OWNER: surayainc
      TIER_N_GRANTS_REPO: suraya
      TIER_N_GRANTS_PATH: governance/tier-n-grants.md
    steps:
      - name: Check approval count for agent-generated PRs
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve the PR object regardless of which event triggered us.
            const pr = context.payload.pull_request
              || context.payload.review?.pull_request;

            if (!pr) {
              core.setFailed("Could not resolve pull request from event payload.");
              return;
            }

            const labels = (pr.labels || []).map(l => l.name);
            const isAgentPR = labels.includes("agent-generated");

            if (!isAgentPR) {
              core.info("PR is not labeled `agent-generated`. Check passes trivially.");
              return;
            }

            // Parse the Active grants table from tier-n-grants.md and return
            // the list of GitHub logins listed there. We bound the parse to
            // the section between "## Active grants" and the next "## "
            // heading so the worked-example diff later in the doc cannot
            // contribute usernames.
            function parseActiveGrants(md) {
              const startMatch = md.match(/##\s+Active grants\s*\n/);
              if (!startMatch) return [];
              const startIdx = startMatch.index + startMatch[0].length;
              const rest = md.slice(startIdx);
              const endMatch = rest.match(/\n##\s+/);
              const slice = endMatch ? rest.slice(0, endMatch.index) : rest;
              const rowRe = /^\|\s*`@([a-zA-Z0-9][a-zA-Z0-9-]*)`\s*\|/gm;
              const logins = [];
              let m;
              while ((m = rowRe.exec(slice)) !== null) logins.push(m[1]);
              return logins;
            }

            // Tier N self-bypass: if the PR author is on the active grants
            // roster in surayainc/suraya:governance/tier-n-grants.md, this
            // check passes without requiring 2 approvals. Fail-closed: any
            // fetch or parse failure falls through to the 2-approval check.
            const author = pr.user.login;
            try {
              const grantsResp = await github.rest.repos.getContent({
                owner: process.env.TIER_N_GRANTS_OWNER,
                repo: process.env.TIER_N_GRANTS_REPO,
                path: process.env.TIER_N_GRANTS_PATH,
              });
              const grantsBody = Buffer.from(grantsResp.data.content, "base64").toString("utf8");
              const tierNAuthors = parseActiveGrants(grantsBody);
              if (tierNAuthors.length === 0) {
                core.warning(
                  "Tier N grants doc parsed but no active grantees found. " +
                  "Falling through to the 2-approval check."
                );
              } else if (tierNAuthors.includes(author)) {
                core.info(
                  `Tier N self-bypass: PR author @${author} is on the active ` +
                  `grants roster (${tierNAuthors.join(", ")}). Check passes without ` +
                  `requiring 2 approvals.`
                );
                return;
              } else {
                core.info(
                  `Tier N roster fetched (${tierNAuthors.length} grantee(s): ` +
                  `${tierNAuthors.join(", ")}); PR author @${author} not on it. ` +
                  `Falling through to 2-approval check.`
                );
              }
            } catch (err) {
              core.warning(
                `Could not fetch Tier N grants doc from ` +
                `${process.env.TIER_N_GRANTS_OWNER}/${process.env.TIER_N_GRANTS_REPO}:` +
                `${process.env.TIER_N_GRANTS_PATH} (${err.message}). ` +
                `Falling through to the 2-approval check (fail-closed default).`
              );
            }

            // Pull the latest reviews. Page through if there are many.
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            // Use only the most recent review per author. Earlier reviews
            // are superseded; a later "request changes" or "dismissed"
            // overrides an earlier "approved".
            const latestByAuthor = new Map();
            for (const review of reviews) {
              const reviewer = review.user?.login;
              if (!reviewer) continue;
              if (reviewer === pr.user.login) continue; // self-reviews don't count
              const prior = latestByAuthor.get(reviewer);
              if (!prior || new Date(review.submitted_at) > new Date(prior.submitted_at)) {
                latestByAuthor.set(reviewer, review);
              }
            }

            const approvers = [...latestByAuthor.values()]
              .filter(r => r.state === "APPROVED")
              .map(r => r.user.login);

            const required = 2;
            const count = approvers.length;

            core.info(`agent-generated PR — ${count}/${required} approvals: ${approvers.join(", ") || "(none)"}`);

            if (count < required) {
              core.setFailed(
                `agent-generated PRs require ${required} human approvals before merge. ` +
                `Currently have ${count}. Approvers so far: ${approvers.join(", ") || "(none)"}`
              );
              return;
            }

            core.info("Approval requirement satisfied.");
